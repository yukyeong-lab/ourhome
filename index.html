<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아워홈 네이버 최신 뉴스</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #111827;
      --sub: #6b7280;
      --line: #e5e7eb;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --green: #03c75a;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Apple SD Gothic Neo, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(3, 199, 90, 0.08), transparent 25%),
        var(--bg);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .hero {
      padding: 72px 0 36px;
    }

    .hero-card {
      background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 58%, #03c75a 130%);
      color: white;
      border-radius: 32px;
      padding: 44px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "NEWS";
      position: absolute;
      right: -14px;
      bottom: -34px;
      font-size: clamp(72px, 14vw, 180px);
      font-weight: 900;
      opacity: 0.08;
      letter-spacing: -0.06em;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 18px;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 58px);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 18px 0 0;
      font-size: clamp(16px, 2vw, 19px);
      max-width: 760px;
      color: rgba(255,255,255,0.88);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: white;
      color: #0f172a;
      box-shadow: 0 12px 30px rgba(0,0,0,0.14);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .stat {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .section {
      padding: 18px 0 60px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: -0.03em;
    }

    .section-head p {
      margin: 8px 0 0;
      color: var(--sub);
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      height: 100%;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.1);
      border-color: rgba(37, 99, 235, 0.28);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 13px;
      color: var(--sub);
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-weight: 600;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .card p {
      margin: 0 0 18px;
      color: #4b5563;
      min-height: 78px;
    }

    .card .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 700;
      color: var(--blue);
    }

    .highlight {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .big-card {
      background: linear-gradient(135deg, #ffffff 0%, #f9fbff 100%);
      border: 1px solid #dbeafe;
    }

    .big-card h3 {
      font-size: clamp(26px, 3vw, 38px);
      margin-bottom: 14px;
    }

    .big-card p {
      font-size: 16px;
      min-height: auto;
      margin-bottom: 22px;
    }

    .side-stack {
      display: grid;
      gap: 18px;
    }

    .footer {
      padding: 0 0 56px;
    }

    .footer-box {
      background: #0f172a;
      color: rgba(255,255,255,0.86);
      border-radius: 28px;
      padding: 28px;
    }

    .footer-box h3 {
      margin: 0 0 10px;
      color: white;
      font-size: 24px;
    }

    .footer-box p {
      margin: 0;
      max-width: 860px;
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(246, 248, 251, 0.78);
      border-bottom: 1px solid rgba(229, 231, 235, 0.85);
    }

    .nav-inner {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #03c75a);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-links a {
      padding: 10px 14px;
      border-radius: 999px;
      color: #374151;
      font-weight: 600;
    }

    .nav-links a:hover {
      background: #e5efff;
      color: var(--blue);
    }

    @media (max-width: 980px) {
      .stats,
      .grid,
      .highlight {
        grid-template-columns: 1fr;
      }

      .hero-card {
        padding: 30px;
      }

      .card p {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .nav-inner,
      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .wrap,
      .nav-inner {
        width: min(100% - 24px, 1180px);
      }

      .hero {
        padding-top: 34px;
      }

      .hero-card {
        border-radius: 24px;
        padding: 24px;
      }
    }
  </style>
</head>
<body>

      <div class="brand">
        <div class="brand-mark">N</div>
        <span>아워홈 네이버 최신 뉴스</span>
      </div>
      <div class="nav-links">
        <a href="#headline">헤드라인</a>
        <a href="#news-grid">뉴스 모음</a>
        <a href="#official">공식 뉴스룸</a>
      </div>
    </div>
  </nav>
